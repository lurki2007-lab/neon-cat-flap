<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Flappy PowerUps</title>
<style>
  body { margin:0; background:#000; display:flex; align-items:center; justify-content:center; height:100vh; font-family:Arial, sans-serif; }
  #game { display:block; }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>

<script>
// ────────────────────────────────────────────────
// CONFIGURACIÓN
// ────────────────────────────────────────────────
const W = 400, H = 600;
const GRAVITY = 0.45;
const FLAP_STRENGTH = -8;
const PIPE_WIDTH = 70;
const PIPE_GAP_MIN = 120;
const PIPE_GAP_MAX = 170;
const PIPE_SPEED = 2.5;
const PIPE_SPAWN_INTERVAL = 1500;
const POWERUP_INTERVAL_MIN = 7000;
const POWERUP_INTERVAL_MAX = 11000;
const POWERUP_FLOAT_AMPLITUDE = 10;
const POWERUP_FLOAT_SPEED = 0.005;
const PROB_SHIELD_5S = 0.20;
const PROB_SHIELD_15S = 0.05;
const PROB_COIN = 0.02;
const GUARANTEED_SHIELD_15S = 0.03;
const GUARANTEED_COIN = 0.05;
const SHIELD_5S_DURATION = 5000;
const SHIELD_15S_DURATION = 15000;
const COIN_BONUS = 5;
const BIRD_RADIUS = 14;

// ────────────────────────────────────────────────
// FONDOS - 3 ESCENARIOS DIFERENTES
// ────────────────────────────────────────────────
const scenarios = [
  {
    name: "Cielo Día",
    img: new Image(),
    src: "di.png",          // ← CAMBIA por tu archivo real
    speed: 0.8,
    groundColor: "#DEB887"
  },
  {
    name: "Atardecer",
    img: new Image(),
    src: "tr.png",    // ← CAMBIA por tu archivo real
    speed: 1.0,
    groundColor: "#D97706"
  },
  {
    name: "Noche Estrellada",
    img: new Image(),
    src: "nc.png",        // ← CAMBIA por tu archivo real
    speed: 1.2,
    groundColor: "#1a1a2e"
  }
];

let currentScenario = 0;
let scenarioChangeCounter = 0;
const PIPES_PER_SCENARIO = 10;   // Cambia cada 10 tuberías (ajusta este valor si quieres)

scenarios.forEach((sc, i) => {
  sc.img.src = sc.src;
  sc.img.onload = () => console.log(`Escenario ${i+1} cargado: ${sc.src}`);
  sc.img.onerror = () => console.error(`Error cargando escenario: ${sc.src}`);
});

// ────────────────────────────────────────────────
// TEXTURA DEL PÁJARO
// ────────────────────────────────────────────────
let birdImage = new Image();
birdImage.src = "pja.png";
birdImage.onload = () => console.log("Textura del pájaro cargada");
birdImage.onerror = () => console.error("Error cargando pájaro");

// ────────────────────────────────────────────────
// AUDIO
// ────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();
function playTone(freq, duration = 0.12, type = 'sine', vol = 0.12) {
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    setTimeout(() => o.stop(), duration*1000);
  } catch(e) {}
}
function playClick() { playTone(880, 0.06, 'square', 0.12); }
function playHit() { playTone(140, 0.24, 'sawtooth', 0.18); }
function playPoint() { playTone(1200, 0.08, 'sine', 0.08); }
function playPower() { playTone(660, 0.12, 'triangle', 0.12); }

// ────────────────────────────────────────────────
// NOMBRE DE USUARIO
// ────────────────────────────────────────────────
let username = localStorage.getItem('flappy_username') || '';
let showUsernameScreen = !username;
function saveUsername(name) {
  if (name.trim().length > 0 && name.trim().length <= 12) {
    username = name.trim();
    localStorage.setItem('flappy_username', username);
    showUsernameScreen = false;
  }
}

// ────────────────────────────────────────────────
// CLASES
// ────────────────────────────────────────────────
class Bird {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.r = BIRD_RADIUS;
    this.vel = 0;
    this.shieldType = null;
    this.shieldExpires = 0;
    this.particles = [];
  }
  flap() {
    this.vel = FLAP_STRENGTH;
    playClick();
  }
  update() {
    this.vel += GRAVITY;
    this.y += this.vel;
    if (this.y - this.r < 0) { this.y = this.r; this.vel = 0; }
    const now = Date.now();
    if (this.shieldExpires > 0 && now > this.shieldExpires) this.deactivateShield();
    if (this.shieldType) this.updateParticles();
  }
  draw(ctx) {
    if (this.shieldType) {
      ctx.save();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = this.shieldType === '15s' ? '#FFD700' : '#64AAFF';
      const auraSize = this.shieldType === '15s' ? this.r * 2.6 : this.r * 2.1;
      ctx.beginPath(); ctx.arc(this.x, this.y, auraSize, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      for (const p of this.particles) {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.vel * 0.08);
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(birdImage, -this.r, -this.r, this.r * 2, this.r * 2);
    ctx.restore();
    if (this.shieldType) {
      const rem = Math.max(0, Math.ceil((this.shieldExpires - Date.now()) / 1000));
      ctx.font = 'bold 20px Arial';
      ctx.fillStyle = this.shieldType === '15s' ? '#FFEB3B' : '#FFFFFF';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeText(rem + 's', this.x, this.y - this.r - 22);
      ctx.fillText(rem + 's', this.x, this.y - this.r - 22);
    }
  }
  getRect() { return { x: this.x - this.r, y: this.y - this.r, w: this.r*2, h: this.r*2 }; }
  activateShield(duration, type) {
    this.shieldType = type;
    this.shieldExpires = Date.now() + duration;
    this.particles = [];
    for (let i = 0; i < 14; i++) {
      const a = Math.random()*Math.PI*2;
      const rad = this.r + 8 + Math.random()*10;
      this.particles.push({a, rad, s:2+Math.random()*4, x:this.x+Math.cos(a)*rad, y:this.y+Math.sin(a)*rad});
    }
    playPower();
  }
  deactivateShield() { this.shieldType = null; this.shieldExpires = 0; this.particles = []; }
  isInvincible() { return this.shieldType !== null; }
  updateParticles() {
    for (const p of this.particles) {
      p.a += 0.18;
      p.x = this.x + Math.cos(p.a)*p.rad;
      p.y = this.y + Math.sin(p.a)*p.rad;
    }
  }
}

class Pipe {
  constructor(x, gapY, gapH) { this.x = x; this.gapY = gapY; this.gapH = gapH; this.passed = false; }
  update() { this.x -= PIPE_SPEED; }
  draw(ctx) {
    ctx.fillStyle = '#34C759';
    ctx.fillRect(this.x, 0, PIPE_WIDTH, this.gapY);
    ctx.fillRect(this.x, this.gapY + this.gapH, PIPE_WIDTH, H - (this.gapY + this.gapH));
  }
  collides(bird) {
    const r = bird.getRect();
    const top = {x:this.x, y:0, w:PIPE_WIDTH, h:this.gapY};
    const bot = {x:this.x, y:this.gapY+this.gapH, w:PIPE_WIDTH, h:H-(this.gapY+this.gapH)};
    return rectIntersect(r, top) || rectIntersect(r, bot);
  }
  offscreen() { return this.x + PIPE_WIDTH < 0; }
}

class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y0 = y; this.type = type;
    this.t0 = Date.now();
    this.r = 14;
    this.phase = Math.random()*Math.PI*2;
  }
  update() {
    this.x -= PIPE_SPEED;
    const t = (Date.now()-this.t0)*POWERUP_FLOAT_SPEED;
    this.y = this.y0 + Math.sin(this.phase + t)*POWERUP_FLOAT_AMPLITUDE;
  }
  draw(ctx) {
    if (this.type === 'shield5') {
      ctx.fillStyle = '#64AAFF'; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#E6F7FF'; ctx.beginPath(); ctx.arc(this.x,this.y,this.r-5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#001133'; ctx.font='bold 16px Arial'; ctx.textAlign='center'; ctx.fillText('S', this.x, this.y+6);
    } else if (this.type === 'shield15') {
      ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(this.x,this.y,this.r+2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFFACD'; ctx.beginPath(); ctx.arc(this.x,this.y,this.r-3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#3F2A00'; ctx.font='bold 15px Arial'; ctx.fillText('S+', this.x, this.y+5);
    } else {
      ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFF1A8'; ctx.beginPath(); ctx.arc(this.x,this.y,this.r-5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#8B5A00'; ctx.font='bold 16px Arial'; ctx.fillText('+5', this.x, this.y+6);
    }
  }
  collides(bird) {
    const r = bird.getRect();
    return !(r.x + r.w < this.x-this.r || r.x > this.x+this.r || r.y + r.h < this.y-this.r || r.y > this.y+this.r);
  }
  offscreen() { return this.x + this.r < 0; }
}

// ────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────
function rectIntersect(a, b) {
  return !(a.x + a.w < b.x || a.x > b.x + b.w || a.y + a.h < b.y || a.y > b.y + b.h);
}
function randInt(a, b) { return Math.floor(Math.random()*(b-a+1)) + a; }

// ────────────────────────────────────────────────
// ESTADO
// ────────────────────────────────────────────────
let bird, pipes, powerups;
let groundY = H - 60;
let playing = false;
let gameOver = false;
let score = 0;
let best = parseInt(localStorage.getItem('flappy_best') || '0', 10);
let lastPipe = 0;
let lastPower = 0;
let appearedShield15 = false;
let appearedCoin = false;
let bgOffset = 0;

function resetGame() {
  bird = new Bird(80, H/2);
  pipes = [];
  powerups = [];
  score = 0;
  lastPipe = Date.now() + 400;
  lastPower = Date.now() + randInt(POWERUP_INTERVAL_MIN, POWERUP_INTERVAL_MAX);
  appearedShield15 = false;
  appearedCoin = false;
  playing = true;
  gameOver = false;
  currentScenario = 0;
  scenarioChangeCounter = 0;
}

// ────────────────────────────────────────────────
// INPUT
// ────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.addEventListener('mousedown', e => {
  try { audioCtx.resume(); } catch(e) {}
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (showUsernameScreen) {
    if (mx > W/2 - 80 && mx < W/2 + 80 && my > 380 && my < 440) {
      const input = document.getElementById('usernameInput');
      if (input) saveUsername(input.value);
    }
    return;
  }

  if (!playing) {
    if (gameOver) {
      const btnWidth = 140;
      const btnHeight = 54;
      const spacing = 40;
      const btnY = H/2 + 50;
      const leftBtnX = W/2 - spacing/2 - btnWidth;
      const rightBtnX = W/2 + spacing/2;
      if (mx >= leftBtnX && mx <= leftBtnX + btnWidth && my >= btnY && my <= btnY + btnHeight) {
        resetGame(); return;
      }
      if (mx >= rightBtnX && mx <= rightBtnX + btnWidth && my >= btnY && my <= btnY + btnHeight) {
        playing = false; gameOver = false; score = 0; pipes=[]; powerups=[]; bird = new Bird(80,H/2);
        return;
      }
    }
    resetGame();
  } else {
    bird.flap();
  }
});

window.addEventListener('keydown', e => {
  if (showUsernameScreen) {
    if (e.code === 'Enter') {
      const input = document.getElementById('usernameInput');
      if (input) saveUsername(input.value);
    }
    return;
  }
  if (e.code === 'Space') {
    e.preventDefault();
    try { audioCtx.resume(); } catch(e) {}
    if (!playing) resetGame();
    else bird.flap();
  }
});

// ────────────────────────────────────────────────
// BUCLE
// ────────────────────────────────────────────────
let lastTime = performance.now();
function loop(ts) {
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;
  update();
  draw();
  requestAnimationFrame(loop);
}

// ────────────────────────────────────────────────
// UPDATE
// ────────────────────────────────────────────────
function update() {
  if (showUsernameScreen) return;
  if (!playing || gameOver) return;

  const t = Date.now();

  if (t - lastPipe > PIPE_SPAWN_INTERVAL) {
    lastPipe = t;
    const gap = randInt(PIPE_GAP_MIN, PIPE_GAP_MAX);
    const gapY = randInt(80, groundY - 80 - gap);
    pipes.push(new Pipe(W + 10, gapY, gap));
  }

  if (t > lastPower) {
    lastPower = t + randInt(POWERUP_INTERVAL_MIN, POWERUP_INTERVAL_MAX);
    const py = randInt(80, groundY - 140);
    let spawned = false;
    if (!appearedShield15 && Math.random() < GUARANTEED_SHIELD_15S) {
      powerups.push(new PowerUp(W + 30, py, 'shield15')); appearedShield15 = true; spawned = true;
    }
    else if (!appearedCoin && Math.random() < GUARANTEED_COIN) {
      powerups.push(new PowerUp(W + 30, py, 'coin')); appearedCoin = true; spawned = true;
    }
    if (!spawned) {
      const r = Math.random();
      if (r < PROB_SHIELD_5S) powerups.push(new PowerUp(W + 30, py, 'shield5'));
      else if (r < PROB_SHIELD_5S + PROB_SHIELD_15S) powerups.push(new PowerUp(W + 30, py, 'shield15'));
      else if (r < PROB_SHIELD_5S + PROB_SHIELD_15S + PROB_COIN) powerups.push(new PowerUp(W + 30, py, 'coin'));
    }
  }

  bird.update();

  for (const p of pipes) {
    p.update();
    if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
      p.passed = true;
      score += 1;
      playPoint();

      // Cambio de escenario
      scenarioChangeCounter++;
      if (scenarioChangeCounter >= PIPES_PER_SCENARIO) {
        currentScenario = (currentScenario + 1) % scenarios.length;
        scenarioChangeCounter = 0;
      }
    }
  }

  for (const pu of powerups) {
    pu.update();
    if (pu.collides(bird)) {
      if (pu.type === 'shield5') bird.activateShield(SHIELD_5S_DURATION, '5s');
      else if (pu.type === 'shield15') bird.activateShield(SHIELD_15S_DURATION, '15s');
      else if (pu.type === 'coin') { score += COIN_BONUS; playPoint(); }
      pu.x = -9999;
    }
  }

  pipes = pipes.filter(p => !p.offscreen());
  powerups = powerups.filter(p => !p.offscreen());

  const collided = pipes.some(p => p.collides(bird));
  if (collided && !bird.isInvincible()) {
    playHit(); gameOver = true; playing = false;
    if (score > best) { best = score; localStorage.setItem('flappy_best', String(best)); }
  }

  if (bird.y + bird.r >= groundY) {
    if (!bird.isInvincible()) {
      playHit(); gameOver = true; playing = false;
      if (score > best) { best = score; localStorage.setItem('flappy_best', String(best)); }
    } else {
      bird.vel = FLAP_STRENGTH;
      bird.y = groundY - bird.r - 2;
    }
  }
}

// ────────────────────────────────────────────────
// DRAW
// ────────────────────────────────────────────────
function draw() {
  const sc = scenarios[currentScenario];

  // Fondo base por si la imagen no carga
  ctx.fillStyle = currentScenario === 0 ? '#87CEEB' :
                  currentScenario === 1 ? '#FF8C42' :
                  '#0d1b2a';
  ctx.fillRect(0, 0, W, H);

  // Fondo escenario con scroll infinito
  if (sc.img.complete && sc.img.naturalWidth > 0) {
    bgOffset -= PIPE_SPEED * sc.speed;
    if (bgOffset <= -W) bgOffset += W;
    ctx.drawImage(sc.img, bgOffset, 0, W, H);
    ctx.drawImage(sc.img, bgOffset + W, 0, W, H);
  }

  for (const p of pipes) p.draw(ctx);
  for (const pu of powerups) pu.draw(ctx);

  // Suelo adaptado al escenario
  ctx.fillStyle = sc.groundColor;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Rayas del suelo (opcional - puedes quitar si tus fondos ya tienen suelo)
  ctx.fillStyle = currentScenario === 2 ? '#2d2d44' : '#C8A078';
  for (let sx = 0; sx < W; sx += 40) {
    ctx.fillRect((sx + ((bgOffset/4)|0)) % W, groundY, 20, H - groundY);
  }

  bird.draw(ctx);

  // HUD
  ctx.textBaseline = 'top';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#000';
  const recordText = username ? `${username} ${best}` : `Mejor: ${best}`;
  ctx.fillText(recordText, 12, 12);

  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(score, W/2, 20);

  if (showUsernameScreen) {
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    roundRect(ctx, 40, 80, W-80, 440, 16, true);
    ctx.fillStyle = '#000';
    ctx.font = '32px Arial'; ctx.textAlign = 'center';
    ctx.fillText('¡Bienvenido!', W/2, 160);
    ctx.font = '20px Arial';
    ctx.fillText('Ingresa tu nombre:', W/2, 220);
    ctx.fillStyle = '#FFFFFF';
    roundRect(ctx, W/2 - 110, 250, 220, 50, 10, true);
    ctx.strokeStyle = '#4A90E2'; ctx.lineWidth = 3;
    ctx.strokeRect(W/2 - 110, 250, 220, 50);
    ctx.fillStyle = '#000'; ctx.font = '22px Arial';
    ctx.fillText(username || 'Escribe aquí...', W/2, 282);
    ctx.fillStyle = '#4CAF50';
    roundRect(ctx, W/2 - 80, 380, 160, 60, 12, true);
    ctx.fillStyle = '#FFFFFF'; ctx.font = '24px Arial';
    ctx.fillText('JUGAR', W/2, 415);
    ctx.font = '14px Arial'; ctx.fillStyle = '#555';
    ctx.fillText('(máx. 12 caracteres)', W/2, 340);
  }

  if (!playing && !gameOver && !showUsernameScreen) {
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    roundRect(ctx, 30, 90, W-60, 340, 12, true);
    ctx.fillStyle = '#000';
    ctx.font = '36px Arial'; ctx.textAlign = 'center';
    ctx.fillText('FLAPPY POWERUPS', W/2, 150);
    ctx.font = '18px Arial';
    ctx.fillText('Presiona ESPACIO o CLIC', W/2, 200);
    ctx.fillText('para jugar', W/2, 225);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF2D55';
    ctx.font = '48px Arial'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, 140);
    ctx.fillStyle = '#FFF';
    ctx.font = '24px Arial';
    ctx.fillText('Puntos: ' + score, W/2, 190);
    ctx.fillStyle = '#FFD700';
    ctx.fillText('Mejor: ' + best, W/2, 225);
    const btnWidth = 140;
    const btnHeight = 54;
    const spacing = 40;
    const btnY = H/2 + 50;
    const leftBtnX = W/2 - spacing/2 - btnWidth;
    const rightBtnX = W/2 + spacing/2;
    ctx.fillStyle = '#4CAF50';
    roundRect(ctx, leftBtnX, btnY, btnWidth, btnHeight, 12, true);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '22px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Continuar', leftBtnX + btnWidth/2, btnY + btnHeight/2);
    ctx.fillStyle = '#2196F3';
    roundRect(ctx, rightBtnX, btnY, btnWidth, btnHeight, 12, true);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('Inicio', rightBtnX + btnWidth/2, btnY + btnHeight/2);
  }
}

function roundRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
  if (fill) ctx.fill();
}

// ────────────────────────────────────────────────
// INICIO
// ────────────────────────────────────────────────
(function init() {
  bird = new Bird(80, H/2);
  pipes = []; powerups = [];
  playing = false; gameOver = false;
  score = 0;
  lastPipe = Date.now() + 400;
  lastPower = Date.now() + randInt(POWERUP_INTERVAL_MIN, POWERUP_INTERVAL_MAX);
  const input = document.createElement('input');
  input.type = 'text';
  input.id = 'usernameInput';
  input.maxLength = 12;
  input.style.position = 'absolute';
  input.style.opacity = '0';
  input.style.pointerEvents = 'none';
  input.style.height = '1px';
  document.body.appendChild(input);
  if (username) showUsernameScreen = false;
  else setTimeout(() => { if (showUsernameScreen) input.focus(); }, 300);
  canvas.addEventListener('touchstart', () => { try{ audioCtx.resume(); }catch(e){} }, {once:true});
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
